# ============================================================
# Helm Template: Role (Namespace-Scoped RBAC)
# ============================================================
#
# PURPOSE:
#   Creates a namespace-scoped Kubernetes Role that defines what API resources
#   the tenant's ServiceAccount is allowed to access within ITS OWN namespace.
#
# WHAT IS A ROLE?
#   A Role is a list of permission rules. Each rule says:
#     "For these API groups, on these resource types, allow these verbs"
#   Example rule from values.yaml:
#     - apiGroups: [""]       ← core API group (pods, services, configmaps)
#       resources: ["pods"]
#       verbs: ["get", "list", "watch"]   ← read-only access
#
# ROLE VS CLUSTERROLE — CRITICAL SECURITY DISTINCTION:
#   Role:        Namespace-scoped — permissions apply ONLY within the namespace
#   ClusterRole: Cluster-scoped — permissions apply ACROSS ALL namespaces
#
#   This chart ALWAYS creates a Role, NEVER a ClusterRole.
#   WHY? If a tenant pod is compromised, the attacker can only access
#   resources in the tenant's own namespace — they cannot enumerate pods
#   in other tenants' namespaces, view cluster secrets, or access Vault.
#
#   The RBAC audit script (ops/rbac_audit.py) specifically checks for
#   ClusterRoleBindings that grant access to ServiceAccounts in the gaas
#   namespace and flags them as HIGH severity tenant isolation violations.
#
# DEFAULT PERMISSIONS (from values.yaml rbac.rules):
#   Read-only access to pods, services, and configmaps in the tenant's own namespace.
#   Tenants commonly need to inspect their own pod status and service endpoints.
#   They do NOT need write access — their CI pipeline handles deployments.
#
# CUSTOMIZING PERMISSIONS:
#   Override via values.yaml:
#     rbac:
#       rules:
#         - apiGroups: [""]
#           resources: ["pods", "pods/log"]
#           verbs: ["get", "list", "watch"]
# ============================================================

# SECURITY: namespace-scoped Role — tenant can NEVER access other namespaces
apiVersion: rbac.authorization.k8s.io/v1
kind: Role  # NOT ClusterRole — this is intentional and enforced
metadata:
  # Role name: <release-name>-tenant-role (e.g., "acme-corp-tenant-role")
  # Must be unique within the namespace — the release name prefix ensures this.
  name: {{ .Release.Name }}-tenant-role
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}
    app.kubernetes.io/part-of: gaas
    gaas/tenant-id: {{ required "tenantId is required" .Values.tenantId | quote }}
rules:
  # Render the rbac.rules list from values.yaml as YAML.
  # nindent 2 adds 2-space indentation to align with the `rules:` key.
  # Example output:
  #   rules:
  #     - apiGroups: [""]
  #       resources: ["pods"]
  #       verbs: ["get", "list", "watch"]
  {{- toYaml .Values.rbac.rules | nindent 2 }}
