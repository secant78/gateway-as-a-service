# ============================================================
# Helm Template: ServiceAccount
# ============================================================
#
# PURPOSE:
#   Creates a dedicated Kubernetes ServiceAccount for this tenant's pods.
#
# WHAT IS A SERVICEACCOUNT?
#   Every Pod in Kubernetes runs AS a ServiceAccount, similar to how a Linux
#   process runs as a user. The ServiceAccount determines:
#     1. What Kubernetes API resources the pod can access (via RBAC)
#     2. What Vault policies the pod is eligible for (via Vault Kubernetes auth)
#     3. The Istio SPIFFE identity for mTLS (spiffe://cluster.local/ns/<ns>/sa/<name>)
#
# WHY A DEDICATED SERVICEACCOUNT PER TENANT?
#   If all tenant pods shared the `default` ServiceAccount:
#     - An RBAC Role bound to `default` would accidentally apply to ALL pods
#     - Vault roles bound to `default` would allow ANY pod to read secrets
#     - Audit logs would show "default" for all pod actions (no attribution)
#
#   With a dedicated ServiceAccount per tenant release:
#     - RBAC and Vault bindings are scoped to exactly this tenant
#     - The Istio SPIFFE identity is unique: spiffe://.../sa/<release-name>-sa
#     - Audit logs show which specific tenant performed which action
#
# CONDITIONAL CREATION:
#   The {{- if .Values.serviceAccount.create -}} block means this resource is
#   only rendered if serviceAccount.create=true (the default in values.yaml).
#   Set serviceAccount.create=false if the tenant's ServiceAccount is managed
#   externally (e.g., by an IAM controller that creates cloud-linked SAs).
#
# NAMING:
#   Name defaults to <release-name>-sa unless overridden in values.yaml.
#   Example: helm install acme-corp → ServiceAccount named "acme-corp-sa"
#   The same default formula is used in deployment.yaml and rolebinding.yaml
#   to ensure all three resources reference the same name.
# ============================================================
{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  # Default name: <release-name>-sa (e.g., "acme-corp-sa")
  # Override with: --set serviceAccount.name=my-custom-sa
  name: {{ default (printf "%s-sa" .Release.Name) .Values.serviceAccount.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}
    app.kubernetes.io/part-of: gaas
    gaas/tenant-id: {{ required "tenantId is required" .Values.tenantId | quote }}
  # Optional annotations — commonly used to link to cloud IAM roles:
  #   AWS IRSA:  eks.amazonaws.com/role-arn: arn:aws:iam::123456789:role/my-role
  #   Azure:     azure.workload.identity/client-id: <client-id>
  # Add via: --set serviceAccount.annotations."eks\.amazonaws\.com/role-arn"=arn:...
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
