---
# Vault Dev-Mode Deployment
# ============================================================
# DESIGN DECISION: Dev mode is intentional for this environment.
# Dev mode eliminates the unseal ceremony and makes the root token
# immediately available — appropriate for ephemeral CI runners and
# Minikube demo clusters where there is no persistent state to protect.
#
# PRODUCTION UPGRADE PATH:
#   1. Replace `server -dev` with `server` (no -dev flag)
#   2. Add a PersistentVolumeClaim for /vault/data
#   3. Configure auto-unseal via AWS KMS or Azure Key Vault in config.hcl
#   4. Use Vault's Kubernetes auth method instead of root token
#
# Root token `gaas-dev-root` is injected into CI via a Kubernetes Secret
# named `vault-dev-token` in the `gaas-vault` namespace.
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: vault-dev-token
  namespace: gaas-vault
  labels:
    app: vault
    app.kubernetes.io/part-of: gaas
type: Opaque
stringData:
  # In production this would NOT be a static value.
  # It is acceptable here because dev-mode Vault has no durable secrets.
  token: "gaas-dev-root"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vault
  namespace: gaas-vault
  labels:
    app: vault
    app.kubernetes.io/name: vault
    app.kubernetes.io/part-of: gaas
    app.kubernetes.io/version: "1.16"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vault
  template:
    metadata:
      labels:
        app: vault
        app.kubernetes.io/name: vault
      annotations:
        # Explicitly opt into Istio sidecar injection even though
        # the namespace label already enables it. Belt-and-suspenders.
        sidecar.istio.io/inject: "true"
    spec:
      serviceAccountName: vault
      containers:
        - name: vault
          image: hashicorp/vault:1.16
          args:
            - "server"
            - "-dev"
            - "-dev-root-token-id=$(VAULT_DEV_ROOT_TOKEN_ID)"
            - "-dev-listen-address=0.0.0.0:8200"
          ports:
            - name: vault-api
              containerPort: 8200
              protocol: TCP
            - name: vault-cluster
              containerPort: 8201
              protocol: TCP
          env:
            - name: VAULT_DEV_ROOT_TOKEN_ID
              valueFrom:
                secretKeyRef:
                  name: vault-dev-token
                  key: token
            - name: VAULT_DEV_LISTEN_ADDRESS
              value: "0.0.0.0:8200"
            - name: VAULT_ADDR
              value: "http://127.0.0.1:8200"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            # IPC_LOCK is required by Vault to prevent sensitive memory pages
            # (containing unsealed key material) from being swapped to disk.
            # Without this capability, Vault logs a warning and may panic
            # on memory-constrained nodes.
            capabilities:
              add:
                - IPC_LOCK
          readinessProbe:
            httpGet:
              path: /v1/sys/health
              port: 8200
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /v1/sys/health?standbyok=true
              port: 8200
              scheme: HTTP
            initialDelaySeconds: 15
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: vault
  namespace: gaas-vault
  labels:
    app: vault
    app.kubernetes.io/part-of: gaas
spec:
  selector:
    app: vault
  ports:
    - name: vault-api
      port: 8200
      targetPort: 8200
      protocol: TCP
  type: ClusterIP

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault
  namespace: gaas-vault
  labels:
    app: vault
    app.kubernetes.io/part-of: gaas
