# ============================================================
# GaaS Auth Service — Spring Boot Application Configuration
# ============================================================
#
# PURPOSE:
#   This file configures every externalized setting for the auth service.
#   Spring Boot reads this file at startup and injects values into beans
#   via @Value annotations (e.g., @Value("${gaas.jwt.issuer}")).
#
# ENVIRONMENT VARIABLE OVERRIDE:
#   Any property here can be overridden at runtime by setting an environment
#   variable with the property name uppercased and dots replaced by underscores.
#   Example: GAAS_JWT_EXPIRY_SECONDS=7200 overrides gaas.jwt.expiry-seconds=3600
#   The CI/CD pipeline uses this pattern to inject Vault addresses and tokens
#   without modifying this file.
#
# PROPERTY NAMING CONVENTIONS:
#   spring.*         → Spring Boot built-in properties (auto-configured)
#   management.*     → Spring Boot Actuator properties
#   logging.*        → Logging configuration
#   gaas.*           → GaaS-specific custom properties (read by @Value in our beans)
# ============================================================

# The application name appears in logs, health responses, and Spring Cloud service discovery.
# Used by Spring Boot Admin (if deployed) to identify this service instance.
spring.application.name=gaas-auth-service

# ============================================================
# Server Port
# ============================================================
# Port 8081 is chosen deliberately to avoid conflicts with other services
# running in the same Kubernetes cluster on the same node:
#   8080 = Spring Boot default (often already occupied by other services)
#   8200 = HashiCorp Vault API (see vault-deployment.yaml)
#   9080 = APISIX data plane (see apisix-values.yaml)
#   9000 = APISIX Dashboard (see apisix-dashboard-config.yaml)
#   9180 = APISIX admin API
# Port 8081 is clean in this environment.
server.port=8081

# ============================================================
# JWT Settings
# These values are injected into JwtService via @Value annotations.
# ============================================================

# The `iss` (issuer) claim in every JWT we sign.
# Receiving services (APISIX jwt-auth plugin) validate this claim to ensure
# the token was issued by THIS service and not a third party.
# Use a URL format per RFC 7519 §4.1.1.
gaas.jwt.issuer=https://gaas.internal

# How long each issued JWT is valid, in seconds.
# 3600 = 1 hour. Short-lived tokens limit the damage window if a token is stolen.
# If a client's token is compromised, it expires in at most 1 hour without
# requiring a token revocation infrastructure (which would add complexity).
gaas.jwt.expiry-seconds=3600

# The `aud` (audience) claim — identifies the intended recipient of the token.
# APISIX's jwt-auth plugin should be configured to validate that aud matches this value.
# A token presented to any OTHER service should be rejected if that service checks aud.
gaas.jwt.audience=gaas-api-gateway

# The path in Vault's KV v2 store where the HMAC-SHA256 signing key is stored.
# IMPORTANT: This path MUST match exactly the path granted in vault-policy.hcl.
# If they differ, the app will fail to start with a Vault permission denied error.
#
# KV v2 path format: secret/data/<path>
#   "secret" is the mount name (enabled in CI with: vault secrets enable -path=secret kv-v2)
#   "data"   is required by KV v2 API (unlike KV v1 which has no /data/ prefix)
#   "gaas/jwt-signing-key" is the actual secret path
#
# The CI pipeline writes this key at bootstrap:
#   vault kv put secret/gaas/jwt-signing-key value=<base64-encoded-256-bit-key>
gaas.jwt.signing-key-vault-path=secret/data/gaas/jwt-signing-key

# ============================================================
# Vault Connection
# ============================================================
# The Vault server URI. In Kubernetes, this resolves to the Vault pod via the
# Kubernetes DNS service discovery format:
#   <service-name>.<namespace>.svc.cluster.local:<port>
# "vault" is the Service name from vault-deployment.yaml
# "gaas-vault" is the namespace from namespace.yaml
# "8200" is the Vault API port
#
# In local development or CI, set the SPRING_CLOUD_VAULT_URI environment variable
# to point to a locally forwarded Vault (e.g., http://127.0.0.1:8200 via kubectl port-forward).
spring.cloud.vault.uri=http://vault.gaas-vault.svc.cluster.local:8200

# Authentication method. "token" uses a static Vault token passed via the
# VAULT_TOKEN environment variable (or spring.cloud.vault.token property).
# For production, switch to "kubernetes" (Vault Kubernetes auth method) where
# the pod's ServiceAccount token is exchanged for a Vault token automatically.
spring.cloud.vault.authentication=token

# VAULT_TOKEN is NOT set here — it is injected at runtime by Kubernetes:
#   - In the vault-deployment.yaml Secret: token = "gaas-dev-root" (dev only)
#   - In production: a short-lived token from the Vault Kubernetes auth method
# Never hardcode the Vault token in this file — it would be committed to git.

# ============================================================
# Spring Boot Actuator
# ============================================================
# Expose only the health and info endpoints over HTTP.
# Other sensitive endpoints (beans, env, mappings) are excluded to prevent
# leaking internal configuration to anyone who can reach this service.
management.endpoints.web.exposure.include=health,info

# Show full health details (component-by-component status).
# This is useful for debugging Vault connectivity in staging.
# In production, consider changing to "when-authorized" to hide details from unauthenticated callers.
management.endpoint.health.show-details=always

# ============================================================
# Logging
# ============================================================
# Set GaaS application code to INFO — logs token issuance and rotation events.
# Change to DEBUG to see every Vault request and Spring Security decision.
logging.level.com.gaas=INFO

# Spring Security at WARN — reduces noise from per-request security filter logs.
# At DEBUG it logs every filter execution, which is overwhelming in a busy service.
logging.level.org.springframework.security=WARN

# ============================================================
# Identity Provider (Keycloak) Configuration
# ============================================================
# These properties configure the integration with Keycloak, the central IdP
# that governs both M2M (Client Credentials) and U2M (Authorization Code) flows.
#
# All gaas.idp.* properties are bound to IdpProperties.java via @ConfigurationProperties.
# Override any property at runtime using environment variables:
#   GAAS_IDP_ISSUER_URI=http://keycloak-svc.gaas-idp.svc.cluster.local:8080/realms/gaas
#
# The CI/CD pipeline (05-gaas-pipeline.yml) injects these as env vars during deployment.
# ============================================================

# ---- Keycloak realm URL ----
# All tokens issued by the "gaas" realm will have this as their `iss` (issuer) claim.
# Format: <keycloak-base-url>/realms/<realm-name>
# In-cluster Kubernetes DNS: keycloak-svc.gaas-idp.svc.cluster.local
# For local dev (kubectl port-forward svc/keycloak-svc 8080:8080 -n gaas-idp):
#   http://localhost:8080/realms/gaas
gaas.idp.issuer-uri=http://keycloak-svc.gaas-idp.svc.cluster.local:8080/realms/gaas

# ---- Auth-service's Keycloak client identity ----
# The auth-service uses this client ID when exchanging authorization codes (U2M flow).
# Must match the "auth-service" client created by keycloak-setup.sh.
gaas.idp.client-id=auth-service

# Client secret for the auth-service Keycloak client.
# CRITICAL: Override this in production via environment variable:
#   GAAS_IDP_CLIENT_SECRET=<secret-from-vault-or-secrets-manager>
# Never commit real secrets to this file.
# The placeholder is safe for local development only.
gaas.idp.client-secret=${KEYCLOAK_AUTH_SERVICE_SECRET:auth-service-secret-change-me}

# ---- Keycloak endpoints ----
# These can be derived from the issuer URI + standard OIDC paths.
# We set them explicitly to avoid network calls during startup
# (if auto-discovery is used, a failure to reach Keycloak would prevent startup).

# Token endpoint: used for Client Credentials grant AND authorization code exchange.
gaas.idp.token-endpoint=${gaas.idp.issuer-uri}/protocol/openid-connect/token

# Introspection endpoint: used to check if a token is still active (not revoked).
gaas.idp.introspect-endpoint=${gaas.idp.issuer-uri}/protocol/openid-connect/token/introspect

# JWKS URI: Keycloak's public signing keys. APISIX's openid-connect plugin fetches these.
# Auth-service uses this to validate Keycloak tokens directly when needed.
gaas.idp.jwks-uri=${gaas.idp.issuer-uri}/protocol/openid-connect/certs

# Authorization endpoint: where /auth/authorize redirects users to start the login flow.
gaas.idp.authorization-endpoint=${gaas.idp.issuer-uri}/protocol/openid-connect/auth

# ---- Callback URL ----
# The public URL of this auth-service. Keycloak redirects users back to:
#   callbackBaseUrl + "/auth/callback"
# MUST match the "Valid Redirect URIs" in the auth-service Keycloak client configuration.
# In production: use the public HTTPS URL (e.g., https://auth.gaas.internal).
# In staging: the in-cluster service URL (Keycloak and auth-service are both in-cluster).
gaas.idp.callback-base-url=http://auth-service.gaas.svc.cluster.local:8081

# ---- MFA enforcement ----
# OAuth scopes that require MFA (Multi-Factor Authentication) before a U2M token is issued.
# When a user requests these scopes via Authorization Code flow, the auth-service checks
# the `amr` (Authentication Methods References) claim in the IdP token.
# If AMR contains only "pwd" (password) — no OTP/WebAuthn — HTTP 403 mfa_required is returned.
#
# For M2M (Client Credentials): MFA is not applicable. High-privilege M2M access
# is controlled at the Keycloak client level (only registered clients get these scopes).
#
# Default: gateway:admin requires admin-level access to APISIX configuration
#          api:write requires write access to tenant APIs
gaas.idp.high-privilege-scopes=gateway:admin,api:write

# ============================================================
# Spring Security OAuth2 Resource Server
# ============================================================
# Configures Spring Security to validate incoming JWT Bearer tokens against
# Keycloak's JWKS endpoint. This protects endpoints that require authentication
# (all endpoints EXCEPT /oauth2/token, /auth/authorize, /auth/callback, and /actuator/*).
#
# When a request arrives with: Authorization: Bearer <token>
#   1. Spring Security fetches Keycloak's public keys from jwk-set-uri
#   2. Verifies the JWT signature with the matching key (identified by `kid` claim)
#   3. Validates exp, iss, aud claims
#   4. Sets the authenticated principal in Spring's SecurityContext
#
# Note: The auth-service also issues its own GaaS JWTs (signed with Vault HMAC key).
# Those tokens are validated by APISIX's jwt-auth plugin, not by this resource server config.
# This config is for validating tokens presented TO the auth-service on protected endpoints.
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${gaas.idp.jwks-uri}

# The expected issuer in tokens presented to the auth-service's protected endpoints.
# Spring Security will reject tokens where iss != this value.
spring.security.oauth2.resourceserver.jwt.issuer-uri=${gaas.idp.issuer-uri}
