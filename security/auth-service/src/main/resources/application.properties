# ============================================================
# GaaS Auth Service Configuration
# ============================================================

spring.application.name=gaas-auth-service

# Port 8081 is chosen deliberately:
#   8080 = Spring Boot default (often occupied)
#   8200 = HashiCorp Vault
#   9080 = APISIX admin API
#   9000 = APISIX Dashboard
# Port 8081 is clean in this environment.
server.port=8081

# ---- JWT Settings ----
gaas.jwt.issuer=https://gaas.internal
gaas.jwt.expiry-seconds=3600
gaas.jwt.audience=gaas-api-gateway

# Path within Vault KV v2 where the base64-encoded HMAC-SHA256 signing key
# is stored. This path MUST match the path granted in vault-policy.hcl.
# The CI pipeline writes the initial key at bootstrap time via:
#   vault kv put secret/gaas/jwt-signing-key value=<base64-key>
gaas.jwt.signing-key-vault-path=secret/data/gaas/jwt-signing-key

# ---- Vault Connection ----
# In CI the VAULT_ADDR environment variable overrides this.
# In Minikube it resolves to the Vault Service in the gaas-vault namespace.
spring.cloud.vault.uri=http://vault.gaas-vault.svc.cluster.local:8200
spring.cloud.vault.authentication=token
# The VAULT_TOKEN environment variable is injected by the Kubernetes Secret
# mounted into the auth-service pod. Never hardcode the token here.

# ---- Actuator ----
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ---- Logging ----
logging.level.com.gaas=INFO
logging.level.org.springframework.security=WARN
